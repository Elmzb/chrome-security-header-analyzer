<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Load our styles here; the logic (popup.js) loads at the end of the body. -->
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Top bar: the tool name, and buttons to copy a text report or open the
       full-page dashboard. Both stay hidden until we have a report to show. -->
  <header class="topbar">
    <span class="topbar-title">Security Header Analyzer</span>
    <div class="topbar-actions">
      <button id="copy" class="ghost-btn" type="button" hidden>Copy report</button>
      <button id="open" class="ghost-btn" type="button" hidden>Open full audit ↗</button>
    </div>
  </header>

  <!-- Shield control: auto-reject cookie banners, plus a line saying what the
       auto-rejecter did on the current page. -->
  <div class="prefs">
    <label class="switch">
      <input type="checkbox" id="autoReject" />
      <span class="switch-label">Auto-reject cookie banners</span>
    </label>
    <p id="consentStatus" class="consent-status" hidden></p>
  </div>

  <!-- Overview: the big letter grade + which page we looked at. Hidden until
       we actually have a report to show. -->
  <section id="overview" class="overview" hidden>
    <div id="grade" class="grade">–</div>
    <div class="overview-text">
      <p id="site" class="site"></p>
      <p id="meta" class="meta"></p>
    </div>
  </section>

  <!-- The results list. popup.js builds one card here per header. -->
  <ul id="results" class="results"></ul>

  <!-- A status / message line. "role=status" + "aria-live" means screen readers
       announce updates here. -->
  <p id="status" class="status" role="status" aria-live="polite">Reading headers…</p>

  <!-- Action buttons (e.g. a Reload button when we have no data yet). -->
  <div id="actions" class="actions" hidden></div>

  <!--
    Load the script as a MODULE (type="module") so it can `import` the shared
    analysis engine from analysis.js. Modules also run after the page is parsed,
    so every element above already exists when the script looks for it.
  -->
  <script type="module" src="popup.js"></script>
</body>
</html>
